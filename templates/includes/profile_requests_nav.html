<nav class="profile-requests-nav" aria-label="Мои заявки">
    <a href="#offers" data-requests-anchor="offers"{% if requests_anchor == 'offers' %} class="is-active"{% endif %}>
        Отклики{% if incoming_count %} <span class="hub-subnav__count">{{ incoming_count }}</span>{% endif %}
    </a>
    <a href="#my-searches" data-requests-anchor="my-searches"{% if requests_anchor == 'my-searches' %} class="is-active"{% endif %}>Я ищу</a>
    {% if user.active_role == 'seller' %}
        <a href="#sent" data-requests-anchor="sent"{% if requests_anchor == 'sent' %} class="is-active"{% endif %}>
            Мои предложения{% if sent_count %} <span class="hub-subnav__count">{{ sent_count }}</span>{% endif %}
        </a>
    {% endif %}
</nav>

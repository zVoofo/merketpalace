{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1 style="margin-bottom:24px">Регистрация</h1>
    <div class="form">
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="form__group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div style="color:var(--error);font-size:.85rem">{{ field.errors.0 }}</div>{% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn" style="width:100%">Зарегистрироваться</button>
        </form>
        <p style="margin-top:16px;text-align:center">Уже есть аккаунт? <a href="{% url 'accounts:login' %}">Войти</a></p>
    </div>
</div>
{% endblock %}

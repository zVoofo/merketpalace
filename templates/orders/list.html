{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Мои заказы</h1>
    <table class="table" style="margin-top:20px">
        <thead><tr><th>Номер</th><th>Сумма</th><th>Статус</th><th>Дата</th><th></th></tr></thead>
        <tbody>
        {% for o in orders %}
            <tr>
                <td>{{ o.order_number }}</td>
                <td>{{ o.total|floatformat:0 }} ₽</td>
                <td>{{ o.get_status_display }}</td>
                <td>{{ o.created_at|date:"d.m.Y H:i" }}</td>
                <td><a href="{% url 'orders:detail' o.pk %}">Подробнее</a></td>
            </tr>
        {% empty %}
            <tr><td colspan="5">Заказов нет</td></tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}

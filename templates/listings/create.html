{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1 style="margin-bottom:24px">Создать объявление</h1>
    <div class="form form--wide">
        <form method="POST" enctype="multipart/form-data" id="listing-form">
            {% csrf_token %}
            {% for field in form %}
                <div class="form__group"><label>{{ field.label }}</label>{{ field }}{% if field.errors %}<div style="color:var(--error)">{{ field.errors.0 }}</div>{% endif %}</div>
            {% endfor %}
            {% include 'includes/media_uploader.html' with min=1 max=10 label="Фото и видео" %}
            <button type="submit" class="btn">Опубликовать</button>
        </form>
    </div>
</div>
{% endblock %}

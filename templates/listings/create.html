{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1 class="page-title">Создать объявление</h1>
    <div class="form form--wide">
        <form method="POST" enctype="multipart/form-data" id="listing-form" data-confirm="Опубликовать объявление? Оно уйдёт на модерацию.">
            {% csrf_token %}
            {% include 'includes/listing_form_fields.html' %}
            {% include 'includes/media_uploader.html' with min=1 max=10 label="Фото и видео" %}
            <p class="form__hint">Фото обязательны — в каталоге работает фильтр «Только с фото»</p>
            <button type="submit" class="btn">Опубликовать</button>
        </form>
    </div>
</div>
{% endblock %}

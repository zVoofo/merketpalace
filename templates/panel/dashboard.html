{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Панель управления</h1>
    <div class="dash-stats" style="margin-top:20px">
        <div class="dash-stat"><div class="dash-stat__num">{{ stats.users }}</div><div class="dash-stat__label">Пользователей</div></div>
        <div class="dash-stat"><div class="dash-stat__num">{{ stats.listings }}</div><div class="dash-stat__label">Объявлений</div></div>
        <div class="dash-stat"><div class="dash-stat__num">{{ stats.pending }}</div><div class="dash-stat__label">На модерации</div></div>
    </div>
    <a href="{% url 'panel:moderation' %}" class="btn">Модерация</a>
    <a href="{% url 'panel:users' %}" class="btn btn--outline" style="margin-left:8px">Пользователи</a>
    <a href="/admin/" class="btn btn--outline" style="margin-left:8px">Django Admin</a>
</div>
{% endblock %}
